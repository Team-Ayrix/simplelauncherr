<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Launcher</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family:'Outfit',sans-serif;
    color:#fff;
    overflow:hidden;

    background:
    linear-gradient(
        rgba(0,0,0,.45),
        rgba(0,0,0,.65)
    ),
    url("https://cdn.discordapp.com/attachments/1507374249499689142/1514190696242876537/9054de59924360eb7ac55e1271b1838a.jpg?ex=6a2a777a&is=6a2925fa&hm=dbdd4f18cbba6b34c711a211b2b337da24ad8836694cce8478d95efaa6d9b087&");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.container{
    padding:30px;
    max-width:700px;
}

.logo{
    width:130px;
    height:130px;
    border-radius:30px;
    object-fit:cover;
    margin-bottom:24px;

    border:1px solid rgba(255,255,255,.12);

    box-shadow:
    0 10px 40px rgba(0,0,0,.45);
}

.title{
    font-size:clamp(42px,8vw,82px);
    font-weight:800;
    letter-spacing:-2px;
    margin-bottom:14px;
    line-height:1.1;
}

.description{
    font-size:16px;
    color:rgba(255,255,255,.78);
    line-height:1.8;
    max-width:560px;
    margin:0 auto 28px;
}

/* Discord Button */
.discord-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;

    padding:14px 24px;
    margin-bottom:16px;

    text-decoration:none;
    color:#fff;
    font-size:15px;
    font-weight:600;

    border-radius:999px;

    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    transition:.25s ease;

    box-shadow:
    0 8px 24px rgba(0,0,0,.25);
}

.discord-btn:hover{
    background:rgba(255,255,255,.12);
    transform:translateY(-2px);
}

/* Status */
.status{
    display:inline-flex;
    align-items:center;
    gap:10px;

    padding:12px 18px;

    border-radius:999px;

    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.10);

    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    font-size:15px;
    font-weight:600;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#FFD500;
}

.footer{
    margin-top:20px;
    font-size:12px;
    letter-spacing:3px;
    color:rgba(255,255,255,.55);
}
</style>
</head>
<body>

<div class="container">

    <img
        class="logo"
        src="https://cdn.discordapp.com/attachments/1514157353933602827/1514188737628733601/Picsart_26-06-10_11-22-34-223.jpg?ex=6a2a75a7&is=6a292427&hm=3439aa7f66e2532243b85dca211e8bcd4fec2cdfe0546b3d56d837a22e1722a0&"
        alt="Simple Launcher Logo">

    <h1 class="title">Simple Launcher</h1>

    <div class="description">
        Future Of Minecraft Java Mobile Gaming.<br>
        Simple Launcher is based on Pojav and FCL.<br>
        Made by Team Ayrix with a smooth UI and smooth gameplay experience.<br>
        Join our Discord community below.
    </div>

    <a href="https://discord.gg/X4dyS2TeVc"
       class="discord-btn"
       target="_blank">
        Join Discord
    </a>

    <br>

    <div class="status">
        <span class="dot"></span>
        Status Soon
    </div>

    <div class="footer">
        COMING SOON
    </div>

</div>

</body>
</html>
